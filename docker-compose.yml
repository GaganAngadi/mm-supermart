services:
  mysql:
    image: mysql:8.4
    container_name: mm-supermart-mysql
    environment:
      MYSQL_DATABASE: mm_supermart
      MYSQL_USER: mm_user
      MYSQL_PASSWORD: mm_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mm_user", "-pmm_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://mm_user:mm_password@mysql:3306/mm_supermart
      JWT_SECRET: change-me-in-production
      PORT: 4000
      WEB_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"

volumes:
  mysql_data:
